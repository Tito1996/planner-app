<section class="mt-4 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
	<h3 class="mb-3 text-base font-semibold text-slate-800">
		@if (mode() === 'create') {
			Crear nueva rutina
		} @else {
			Editar rutina
		}
	</h3>

	<form class="flex flex-col gap-3" (ngSubmit)="submit()">
		<mat-form-field appearance="outline" class="w-full">
			<mat-label>Nombre de la rutina</mat-label>
			<input matInput [formControl]="nameControl" maxlength="60" placeholder="Ej: Torso superior" />
			@if (nameControl.hasError('required')) {
				<mat-error>El nombre es obligatorio.</mat-error>
			}
		</mat-form-field>

		<div class="flex items-center justify-end gap-2">
			<button mat-icon-button type="button" aria-label="Cancelar" (click)="cancel()">
				<mat-icon aria-hidden="true">close</mat-icon>
			</button>
			<button mat-icon-button type="submit" aria-label="Guardar" [disabled]="nameControl.invalid">
				@if (mode() === 'create') {
					<mat-icon aria-hidden="true">add_task</mat-icon>
				} @else {
					<mat-icon aria-hidden="true">save</mat-icon>
				}
			</button>
		</div>
	</form>
</section>
